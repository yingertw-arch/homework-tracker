<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<title>班級行事曆・聯絡簿</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  .header {
    background: #1e293b; border-bottom: 1.5px solid #334155;
    padding: 16px 20px; text-align: center;
  }
  .header h1 { font-size: 20px; font-weight: 800; }
  .header p  { font-size: 12px; color: #64748b; margin-top: 3px; }

  .main { flex: 1; padding: 18px 16px 40px; max-width: 560px; margin: 0 auto; width: 100%; }

  .section { margin-bottom: 26px; }
  .section-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 17px; font-weight: 800; margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1.5px solid #334155;
  }

  .day-group { margin-bottom: 14px; }
  .day-label { font-size: 13px; font-weight: 700; color: #94a3b8; margin-bottom: 6px; }
  .day-label .today-tag { color: #4ade80; }

  .item {
    display: flex; align-items: flex-start; gap: 10px;
    background: #1e293b; border: 1.5px solid #334155;
    border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
  }
  .item .badge {
    flex-shrink: 0; min-width: 46px; text-align: center;
    font-size: 13px; font-weight: 800; padding: 3px 6px; border-radius: 8px;
  }
  .item.event  { border-left: 4px solid #f59e0b; }
  .item.event  .badge { background: #422006; color: #fbbf24; }
  .item.hw     { border-left: 4px solid #4ade80; }
  .item.hw     .badge { background: #0a2a10; color: #4ade80; }
  .item .text  { font-size: 17px; font-weight: 600; line-height: 1.45; word-break: break-word; }

  .empty { font-size: 14px; color: #64748b; padding: 8px 2px; }

  .state {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; color: #64748b; text-align: center; padding: 40px 20px;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid #334155; border-top-color: #4ade80;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { text-align: center; font-size: 11px; color: #475569; padding: 14px; }
</style>
</head>
<body>
  <div class="header">
    <h1>📋 班級行事曆・聯絡簿</h1>
    <p>家長專用・即時更新</p>
  </div>

  <div class="main" id="main">
    <div class="state" id="loading">
      <div class="spinner"></div>
      <div>載入中…</div>
    </div>
    <div id="content" style="display:none;">
      <div class="section">
        <div class="section-title">📅 行事曆</div>
        <div id="events-list"></div>
      </div>
      <div class="section">
        <div class="section-title">📓 聯絡簿</div>
        <div id="hw-list"></div>
      </div>
    </div>
  </div>

  <div class="footer" id="footer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDTT6UzOWRk_oqa8TXm3N1DK-1HiouKjxg",
  authDomain: "homework-tracker-5c6d3.firebaseapp.com",
  projectId: "homework-tracker-5c6d3",
  storageBucket: "homework-tracker-5c6d3.firebasestorage.app",
  messagingSenderId: "133239689183",
  appId: "1:133239689183:web:196488edd609c4fa663e6a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

function escHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtFull(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const wd = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${d.getMonth()+1}月${d.getDate()}日（${wd}）`;
}
function shortBadge(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function render(list) {
  const today = todayStr();
  const events = list.filter(i => i.type === 'event' && i.date >= today).sort((a,b)=>a.date.localeCompare(b.date));
  const hw     = list.filter(i => i.type === 'homework' && i.date >= today).sort((a,b)=>a.date.localeCompare(b.date));

  // 行事曆：依日期分組
  const evEl = document.getElementById('events-list');
  if (!events.length) {
    evEl.innerHTML = '<div class="empty">目前沒有行事曆事項</div>';
  } else {
    const byDate = {};
    events.forEach(i => { (byDate[i.date] = byDate[i.date] || []).push(i); });
    evEl.innerHTML = Object.entries(byDate).map(([date, items]) => `
      <div class="day-group">
        <div class="day-label">${fmtFull(date)}${date===today?' <span class="today-tag">・今天</span>':''}</div>
        ${items.map(i => `
          <div class="item event">
            <span class="text">${escHtml(i.text)}</span>
          </div>`).join('')}
      </div>`).join('');
  }

  // 聯絡簿：每項帶日期 badge
  const hwEl = document.getElementById('hw-list');
  if (!hw.length) {
    hwEl.innerHTML = '<div class="empty">目前沒有聯絡簿事項</div>';
  } else {
    hwEl.innerHTML = hw.map(i => {
      const badge = i.date === today ? '今日' : shortBadge(i.date);
      return `<div class="item hw">
        <span class="badge">${badge}</span>
        <span class="text">${escHtml(i.text)}</span>
      </div>`;
    }).join('');
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = '';
  document.getElementById('footer').textContent = '最後更新：' + new Date().toLocaleString('zh-TW');
}

function showError(msg) {
  document.getElementById('loading').innerHTML =
    `<div style="font-size:32px;">⚠️</div><div>${escHtml(msg)}</div>`;
}

// 匿名登入（家長無感，無需登入畫面）後即時讀取行事曆＋聯絡簿
auth.signInAnonymously()
  .then(() => {
    db.collection('data').doc('daily').onSnapshot(
      doc => render(doc.exists ? (doc.data().list || []) : []),
      err => { console.error(err); showError('連線失敗，請重新整理'); }
    );
  })
  .catch(e => { console.error('匿名登入失敗：', e); showError('連線失敗，請重新整理'); });
</script>
</body>
</html>
